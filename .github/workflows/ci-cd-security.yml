# Enterprise CI/CD Pipeline with Security Scanning
# Multi-stage builds, comprehensive security checks, and GitOps deployment

name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * 1'  # Weekly security scan on Monday 2 AM

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  
jobs:
  # Security and Compliance Checks
  security-compliance:
    name: Security & Compliance Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pipenv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/Pipfile.lock') }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      # License Compliance Check
      - name: License Compliance Check
        run: |
          pip install pip-licenses
          pip-licenses --format=json --output-file=licenses.json
          python scripts/check_licenses.py licenses.json
          
      # Secret Scanning
      - name: Secret Scanning with GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          
      # SAST - Static Application Security Testing
      - name: Run Bandit Security Linter
        run: |
          pip install bandit[toml]
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -f txt
          
      - name: CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: python, javascript
          queries: security-extended,security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:python"
          
      # Dependency Vulnerability Scanning
      - name: Run Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json > snyk-report.json
        continue-on-error: true
        
      - name: Python Safety Check
        run: |
          pip install safety
          safety check --json --output safety-report.json || true
          safety check
          
      # Infrastructure as Code Security
      - name: Terraform Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'infrastructure/'
          format: 'sarif'
          output: 'trivy-iac-results.sarif'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-iac-results.sarif'
          
      # Docker Security Scanning
      - name: Build Docker image for scanning
        run: |
          docker build -t temp-security-scan:latest .
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'temp-security-scan:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      # Compliance Checks
      - name: GDPR Compliance Check
        run: |
          python scripts/gdpr_compliance_check.py
          
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          
      # Generate Security Report
      - name: Generate Security Summary
        run: |
          python scripts/generate_security_report.py \
            --bandit bandit-report.json \
            --snyk snyk-report.json \
            --safety safety-report.json \
            --output security-summary.md
            
      - name: Upload Security Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            snyk-report.json  
            safety-report.json
            security-summary.md
            trivy-*.sarif
          retention-days: 30

  # Code Quality and Testing
  quality-testing:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    needs: security-compliance
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: chatbot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          
      - name: Install Node.js dependencies
        run: |
          cd frontend
          npm ci
          
      # Code Quality Checks
      - name: Run Black Code Formatter Check
        run: |
          black --check --diff .
          
      - name: Run isort Import Sorter Check
        run: |
          isort --check-only --diff .
          
      - name: Run Flake8 Linter
        run: |
          flake8 . --statistics --tee --output-file=flake8-report.txt
          
      - name: Run mypy Type Checker
        run: |
          mypy . --json-report mypy-report
          
      - name: ESLint for Frontend
        run: |
          cd frontend
          npm run lint
          
      - name: Prettier Format Check
        run: |
          cd frontend
          npm run format:check
          
      # Performance and Load Testing
      - name: Install Load Testing Tools
        run: |
          pip install locust
          
      - name: Start Application for Testing
        run: |
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/chatbot_test
          REDIS_URL: redis://localhost:6379
          
      - name: Run Unit Tests
        run: |
          pytest tests/unit/ -v --cov=api --cov-report=xml --cov-report=html --junit-xml=pytest-unit.xml
          
      - name: Run Integration Tests
        run: |
          pytest tests/integration/ -v --junit-xml=pytest-integration.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/chatbot_test
          REDIS_URL: redis://localhost:6379
          
      - name: Run Load Tests
        run: |
          cd tests/load_testing
          locust -f locustfile.py --host=http://localhost:8000 --users=10 --spawn-rate=2 --run-time=2m --headless --html=load-test-report.html
          
      - name: Frontend Unit Tests
        run: |
          cd frontend
          npm run test:ci
          
      - name: Frontend E2E Tests
        run: |
          cd frontend
          npm run test:e2e:ci
          
      # Performance Regression Testing
      - name: Performance Regression Test
        run: |
          python scripts/performance_regression_test.py \
            --baseline performance-baseline.json \
            --current performance-current.json \
            --threshold 20  # 20% degradation threshold
            
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            pytest-*.xml
            htmlcov/
            mypy-report/
            flake8-report.txt
            load-test-report.html
            frontend/coverage/
          retention-days: 30
          
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Build and Package
  build-package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [security-compliance, quality-testing]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      # Multi-stage Docker build
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.multistage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            
      # Container Security Scanning
      - name: Run Trivy vulnerability scanner on built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-container-results.sarif'
          
      # Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.tags }}
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.spdx.json

  # Documentation Generation
  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: quality-testing
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install documentation dependencies
        run: |
          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
          pip install -r requirements.txt
          
      - name: Generate API Documentation
        run: |
          cd docs
          make html
          
      - name: Generate OpenAPI Specification
        run: |
          python scripts/generate_openapi.py --output docs/openapi.json
          
      - name: Generate Architecture Diagrams
        run: |
          pip install diagrams
          python scripts/generate_architecture_diagrams.py
          
      - name: Deploy Documentation to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html

  # GitOps Deployment Preparation
  gitops-prep:
    name: GitOps Deployment Preparation
    runs-on: ubuntu-latest
    needs: build-package
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
          
      - name: Update Kubernetes Manifests
        run: |
          cd gitops
          
          # Update image tags in Kustomization
          yq eval ".images[0].newTag = \"${{ needs.build-package.outputs.image-tag }}\"" -i overlays/production/kustomization.yaml
          
          # Update Helm values
          yq eval ".image.tag = \"${{ needs.build-package.outputs.image-tag }}\"" -i helm/ai-chatbot/values.yaml
          
          # Update ArgoCD Application
          yq eval ".spec.source.targetRevision = \"${{ github.sha }}\"" -i argocd/applications/ai-chatbot.yaml
          
      - name: Commit and Push Changes
        run: |
          cd gitops
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --staged --quiet || git commit -m "Update AI Chatbot to ${{ github.sha }}"
          git push

  # Security Baseline and Compliance
  compliance-check:
    name: Compliance Validation
    runs-on: ubuntu-latest
    needs: build-package
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: SOC 2 Compliance Check
        run: |
          python scripts/soc2_compliance_check.py
          
      - name: GDPR Compliance Validation
        run: |
          python scripts/gdpr_validation.py
          
      - name: HIPAA Compliance Check
        run: |
          python scripts/hipaa_compliance_check.py
          
      - name: Generate Compliance Report
        run: |
          python scripts/generate_compliance_report.py \
            --output compliance-report.pdf \
            --format pdf
            
      - name: Upload Compliance Report
        uses: actions/upload-artifact@v3
        with:
          name: compliance-report
          path: compliance-report.pdf

  # Performance Benchmarking
  performance-benchmark:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[benchmark]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Performance Testing Environment
        run: |
          docker-compose -f docker-compose.performance.yml up -d
          sleep 30
          
      - name: Run Comprehensive Load Tests
        run: |
          cd tests/performance
          python run_benchmark_suite.py \
            --duration 300 \
            --users 1000 \
            --output benchmark-results.json
            
      - name: Performance Regression Analysis
        run: |
          python scripts/performance_analysis.py \
            --current benchmark-results.json \
            --baseline performance-baseline.json \
            --output performance-report.html
            
      - name: Update Performance Baseline
        if: github.ref == 'refs/heads/main'
        run: |
          cp benchmark-results.json performance-baseline.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add performance-baseline.json
          git commit -m "Update performance baseline [skip ci]"
          git push

  # Notification and Reporting
  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [security-compliance, quality-testing, build-package, compliance-check]
    if: always()
    
    steps:
      - name: Notify Slack on Success
        if: ${{ needs.security-compliance.result == 'success' && needs.quality-testing.result == 'success' && needs.build-package.result == 'success' }}
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#ci-cd'
          text: |
            ✅ CI/CD Pipeline completed successfully!
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Security: ✅ | Tests: ✅ | Build: ✅ | Compliance: ✅
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          
      - name: Notify Slack on Failure
        if: ${{ needs.security-compliance.result == 'failure' || needs.quality-testing.result == 'failure' || needs.build-package.result == 'failure' }}
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#ci-cd'
          text: |
            ❌ CI/CD Pipeline failed!
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Security: ${{ needs.security-compliance.result == 'success' && '✅' || '❌' }}
            Tests: ${{ needs.quality-testing.result == 'success' && '✅' || '❌' }}
            Build: ${{ needs.build-package.result == 'success' && '✅' || '❌' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}