apiVersion: v1
kind: Secret
metadata:
  name: ai-chatbot-secrets
  namespace: ai-chatbot
type: Opaque
stringData:
  # These values should be replaced with actual base64 encoded secrets
  # Use kubectl create secret or a secrets management system
  OPENAI_API_KEY: "your-openai-api-key-here"
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"
  REDIS_PASSWORD: "your-redis-password-here"